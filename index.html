<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>GCA — Gestão de Almoxarifado</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy:     #080f1e;
      --navy-mid: #0d1a2e;
      --navy-lt:  #122040;
      --cyan:     #00B8E6;
      --cyan-glow:#00B8E630;
      --amber:    #f59e0b;
      --green:    #22c55e;
      --white:    #f0f4ff;
      --muted:    #64748b;
    }

    html, body {
      height: 100%;
      background: var(--navy);
      color: var(--white);
      font-family: 'Space Grotesk', sans-serif;
      overflow: hidden;
    }

    /* ── Animated background grid ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,184,230,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,184,230,0.04) 1px, transparent 1px);
      background-size: 48px 48px;
      animation: gridDrift 30s linear infinite;
      z-index: 0;
    }

    @keyframes gridDrift {
      from { background-position: 0 0; }
      to   { background-position: 48px 48px; }
    }

    /* ── Radial glow behind center ── */
    body::after {
      content: '';
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 800px; height: 800px;
      background: radial-gradient(circle, rgba(0,184,230,0.07) 0%, transparent 70%);
      z-index: 0;
      pointer-events: none;
    }

    /* ── Layout ── */
    .page {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }

    /* ── Logo ── */
    .logo-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 56px;
      animation: fadeDown 0.7s ease both;
    }

    .logo-badge {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 88px; height: 88px;
      background: linear-gradient(135deg, rgba(0,184,230,0.2), rgba(0,184,230,0.05));
      border: 1px solid rgba(0,184,230,0.4);
      border-radius: 24px;
      font-size: 36px;
      font-weight: 900;
      color: var(--cyan);
      letter-spacing: -2px;
      font-family: 'JetBrains Mono', monospace;
      box-shadow: 0 0 40px rgba(0,184,230,0.15), inset 0 1px 0 rgba(255,255,255,0.08);
      margin-bottom: 20px;
      position: relative;
    }

    .logo-badge::after {
      content: '';
      position: absolute;
      inset: -1px;
      border-radius: 24px;
      background: linear-gradient(135deg, rgba(0,184,230,0.3), transparent 60%);
      z-index: -1;
    }

    .logo-title {
      font-size: 28px;
      font-weight: 800;
      letter-spacing: -0.5px;
      color: var(--white);
    }

    .logo-sub {
      font-size: 13px;
      color: var(--muted);
      font-weight: 400;
      margin-top: 6px;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    /* ── Filial cards ── */
    .cards {
      display: flex;
      gap: 24px;
      flex-wrap: wrap;
      justify-content: center;
      animation: fadeUp 0.7s 0.2s ease both;
    }

    .card {
      position: relative;
      width: 300px;
      background: linear-gradient(145deg, rgba(13,26,46,0.95), rgba(8,15,30,0.95));
      border: 1px solid rgba(0,184,230,0.18);
      border-radius: 24px;
      padding: 36px 32px;
      cursor: pointer;
      text-decoration: none;
      color: inherit;
      transition: transform 0.25s ease, border-color 0.25s ease, box-shadow 0.25s ease;
      overflow: hidden;
      backdrop-filter: blur(10px);
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(0,184,230,0.6), transparent);
      opacity: 0;
      transition: opacity 0.3s;
    }

    .card:hover {
      transform: translateY(-6px);
      border-color: rgba(0,184,230,0.5);
      box-shadow: 0 24px 60px rgba(0,0,0,0.4), 0 0 40px rgba(0,184,230,0.1);
    }

    .card:hover::before { opacity: 1; }

    .card-glow {
      position: absolute;
      top: -60px; right: -60px;
      width: 180px; height: 180px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(0,184,230,0.08), transparent 70%);
      pointer-events: none;
      transition: opacity 0.3s;
    }

    .card:hover .card-glow { opacity: 2; }

    .card-icon {
      width: 52px; height: 52px;
      background: rgba(0,184,230,0.1);
      border: 1px solid rgba(0,184,230,0.25);
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      margin-bottom: 20px;
    }

    .card-tag {
      display: inline-block;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--cyan);
      background: rgba(0,184,230,0.1);
      border: 1px solid rgba(0,184,230,0.2);
      border-radius: 20px;
      padding: 3px 10px;
      margin-bottom: 12px;
    }

    .card-title {
      font-size: 20px;
      font-weight: 800;
      color: var(--white);
      margin-bottom: 8px;
      letter-spacing: -0.3px;
    }

    .card-desc {
      font-size: 13px;
      color: var(--muted);
      line-height: 1.6;
      margin-bottom: 28px;
    }

    .card-btn {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(0,184,230,0.08);
      border: 1px solid rgba(0,184,230,0.2);
      border-radius: 12px;
      padding: 12px 16px;
      font-size: 13px;
      font-weight: 700;
      color: var(--cyan);
      transition: background 0.2s, border-color 0.2s;
    }

    .card:hover .card-btn {
      background: rgba(0,184,230,0.16);
      border-color: rgba(0,184,230,0.4);
    }

    .card-btn-arrow {
      font-size: 18px;
      transition: transform 0.2s;
    }

    .card:hover .card-btn-arrow { transform: translateX(4px); }

    /* ── Status dot ── */
    .status-dot {
      display: inline-block;
      width: 7px; height: 7px;
      background: var(--green);
      border-radius: 50%;
      margin-right: 6px;
      box-shadow: 0 0 6px var(--green);
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.4; }
    }

    /* ── Footer ── */
    .footer {
      margin-top: 52px;
      font-size: 12px;
      color: rgba(100,116,139,0.6);
      letter-spacing: 1px;
      text-align: center;
      animation: fadeUp 0.7s 0.4s ease both;
    }

    .footer span {
      color: rgba(0,184,230,0.5);
      font-family: 'JetBrains Mono', monospace;
    }

    /* ── Animations ── */
    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Responsive ── */
    @media (max-width: 680px) {
      .cards { flex-direction: column; align-items: center; }
      .card  { width: 100%; max-width: 340px; }
    }
  </style>
</head>
<body>
  <div class="page">

    <!-- Logo -->
    <div class="logo-wrap">
      <div class="logo-badge">GCA</div>
      <div class="logo-title">Gestão de Almoxarifado</div>
      <div class="logo-sub">Selecione a filial para acessar</div>
    </div>

    <!-- Cards -->
    <div class="cards">

      <!-- Filial Maricá -->
      <a class="card" href="https://script.google.com/macros/s/AKfycbxr761S8IDiAFkSZma4TyCXbzgG6lGy54FySEH4--nsC44uyYIJ_7mtSwQFjOtW6Mykwg/exec" target="_blank">
        <div class="card-glow"></div>
        <div class="card-icon">🏭</div>
        <div class="card-tag">Filial 01</div>
        <div class="card-title">Maricá</div>
        <div class="card-desc">
          <span class="status-dot"></span>Sistema online · Rio de Janeiro
        </div>
        <div class="card-btn">
          Acessar sistema
          <span class="card-btn-arrow">→</span>
        </div>
      </a>

      <!-- Filial Rio das Ostras -->
      <a class="card" href="https://script.google.com/macros/s/AKfycbwTi7aI9vX5vK67FYy_MXOAIsuc5dcKBaH2KvnAF0kGraOG3HJVnNKYHJKT4KCGh572Cw/exec" target="_blank">
        <div class="card-glow"></div>
        <div class="card-icon">🏗️</div>
        <div class="card-tag">Filial 02</div>
        <div class="card-title">Rio das Ostras</div>
        <div class="card-desc">
          <span class="status-dot"></span>Sistema online · Rio de Janeiro
        </div>
        <div class="card-btn">
          Acessar sistema
          <span class="card-btn-arrow">→</span>
        </div>
      </a>

    </div>

    <!-- Footer -->
    <div class="footer">
      <span>GCA</span> · Gestão de Almoxarifado &nbsp;·&nbsp; Todos os direitos reservados
    </div>

  </div>
</body>
</html>
