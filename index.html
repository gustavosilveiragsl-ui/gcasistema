<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <link rel="icon" type="image/png" href="https://i.postimg.cc/hvM5wcMw/LOGOTIPO-GCA.png">

  <script>
(function() {
  const GAS_URL = 'https://script.google.com/macros/s/AKfycbzgE5mOyRtV0U5MxoBQ1hWf-zR1osO-Vkce9UuENCaNx1uHYJQ15eLGR_IAzOwOtOi3/exec';

  function makeRunner(handlers) {
    handlers = handlers || {};
    return new Proxy({}, {
      get: function(target, prop) {
        if (prop === 'withSuccessHandler') return function(fn) { return makeRunner(Object.assign({}, handlers, { success: fn })); };
        if (prop === 'withFailureHandler') return function(fn) { return makeRunner(Object.assign({}, handlers, { failure: fn })); };
        if (prop === 'withUserObject')     return function(obj){ return makeRunner(Object.assign({}, handlers, { userObject: obj })); };
        return function() {
          var args = Array.prototype.slice.call(arguments);
          fetch(GAS_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'text/plain' },
            body: JSON.stringify({ action: prop, params: args })
          })
          .then(function(r){ return r.json(); })
          .then(function(data){
            if (data.ok) { if (handlers.success) handlers.success(data.result); }
            else         { if (handlers.failure) handlers.failure({ message: data.error }); }
          })
          .catch(function(err){ if (handlers.failure) handlers.failure(err); });
        };
      }
    });
  }

  if (typeof google === 'undefined' || typeof google.script === 'undefined') {
    window.google = { script: { run: makeRunner() } };
  }
})();
</script>

  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>GCA — Portal de Acesso</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --navy:  #080f1e;
      --cyan:  #00B8E6;
      --white: #f0f4ff;
      --muted: #64748b;
      --red:   #ef4444;
      --green: #22c55e;
    }
    html, body {
      height: 100%; background: var(--navy);
      color: var(--white); font-family: 'Space Grotesk', sans-serif;
    }
    body::before {
      content: ''; position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(0,184,230,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,184,230,0.04) 1px, transparent 1px);
      background-size: 48px 48px;
      animation: gridDrift 30s linear infinite; z-index: 0;
    }
    @keyframes gridDrift {
      from { background-position: 0 0; }
      to   { background-position: 48px 48px; }
    }
    .page {
      position: relative; z-index: 1; min-height: 100vh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; padding: 40px 20px;
    }
    .logo-badge {
      width: 80px; height: 80px;
      background: linear-gradient(135deg, rgba(0,184,230,0.2), rgba(0,184,230,0.05));
      border: 1px solid rgba(0,184,230,0.4); border-radius: 22px;
      display: flex; align-items: center; justify-content: center;
      font-size: 28px; font-weight: 900; color: var(--cyan);
      font-family: 'JetBrains Mono', monospace;
      box-shadow: 0 0 40px rgba(0,184,230,0.15);
      margin-bottom: 16px;
      animation: fadeDown 0.6s ease both;
    }
    .logo-title {
      font-size: 24px; font-weight: 800; color: var(--white);
      animation: fadeDown 0.6s 0.1s ease both;
    }
    .logo-sub {
      font-size: 12px; color: var(--muted); margin-top: 6px;
      letter-spacing: 2px; text-transform: uppercase;
      margin-bottom: 40px;
      animation: fadeDown 0.6s 0.2s ease both;
    }
    .card {
      width: 100%; max-width: 420px;
      background: rgba(13,26,46,0.95);
      border: 1px solid rgba(0,184,230,0.18);
      border-radius: 24px; padding: 36px 32px;
      animation: fadeUp 0.6s 0.3s ease both;
    }
    .card-title { font-size: 18px; font-weight: 800; margin-bottom: 6px; }
    .card-sub   { font-size: 13px; color: var(--muted); margin-bottom: 28px; }
    label {
      display: block; font-size: 12px; font-weight: 600;
      color: var(--muted); letter-spacing: 1px;
      text-transform: uppercase; margin-bottom: 8px;
    }
    input {
      width: 100%; background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px; padding: 12px 16px;
      color: var(--white); font-size: 14px;
      font-family: 'Space Grotesk', sans-serif;
      outline: none; margin-bottom: 16px; transition: border-color 0.2s;
    }
    input:focus { border-color: rgba(0,184,230,0.6); }
    .btn {
      width: 100%; padding: 14px;
      background: rgba(0,184,230,0.15);
      border: 1px solid rgba(0,184,230,0.4);
      border-radius: 12px; color: var(--cyan);
      font-size: 15px; font-weight: 700;
      font-family: 'Space Grotesk', sans-serif;
      cursor: pointer; transition: all 0.2s; margin-top: 4px;
    }
    .btn:hover   { background: rgba(0,184,230,0.28); }
    .btn:disabled{ opacity: 0.5; cursor: not-allowed; }
    .erro {
      background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3);
      border-radius: 10px; padding: 10px 14px;
      color: var(--red); font-size: 13px; margin-bottom: 16px; display: none;
    }
    .filiais { display: flex; flex-direction: column; gap: 12px; }
    .filial-card {
      display: flex; align-items: center; justify-content: space-between;
      background: rgba(0,184,230,0.06); border: 1px solid rgba(0,184,230,0.2);
      border-radius: 14px; padding: 16px 20px; cursor: pointer;
      transition: all 0.2s; text-decoration: none; color: var(--white);
    }
    .filial-card:hover {
      background: rgba(0,184,230,0.14);
      border-color: rgba(0,184,230,0.5);
      transform: translateX(4px);
    }
    .filial-nome  { font-size: 16px; font-weight: 700; }
    .filial-arrow { color: var(--cyan); font-size: 20px; }
    .dot {
      width: 7px; height: 7px; background: var(--green);
      border-radius: 50%; display: inline-block; margin-right: 8px;
      box-shadow: 0 0 6px var(--green); animation: pulse 2s infinite;
    }
    .voltar {
      background: none; border: none; color: var(--muted);
      font-size: 13px; cursor: pointer; margin-top: 20px;
      display: block; text-align: center; width: 100%;
      font-family: 'Space Grotesk', sans-serif;
    }
    .voltar:hover { color: var(--white); }
    .footer {
      margin-top: 40px; font-size: 12px;
      color: rgba(100,116,139,0.5); text-align: center;
      animation: fadeUp 0.6s 0.5s ease both;
    }
    .footer span { color: rgba(0,184,230,0.5); font-family: 'JetBrains Mono', monospace; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
    @keyframes fadeDown {
      from{opacity:0;transform:translateY(-16px)} to{opacity:1;transform:translateY(0)}
    }
    @keyframes fadeUp {
      from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)}
    }
  </style>
</head>
<body>
<div class="page">

  <div style="animation: fadeDown 0.6s ease both; margin-bottom:16px;">
  <img src="https://i.postimg.cc/hvM5wcMw/LOGOTIPO-GCA.png" 
    alt="GCA" style="width:180px; object-fit:contain;"/>
</div>
<div class="logo-sub">Portal de Acesso</div>

  <!-- Tela 1: Login Empresa -->
  <div class="card" id="telaEmpresa">
    <div class="card-title">Acesso da Empresa</div>
    <div class="card-sub">Digite o nome e o código de acesso da sua empresa</div>
    <div id="erroEmpresa" class="erro"></div>
    <label>Empresa</label>
    <input id="inputEmpresa" type="text" placeholder="Nome Da Organização"
      onkeydown="if(event.key==='Enter') document.getElementById('inputCodigo').focus()"/>
    <label>Código de Acesso</label>
    <input id="inputCodigo" type="text" placeholder="Codigo Cliente"
      onkeydown="if(event.key==='Enter') portal_entrar()"/>
    <button class="btn" id="btnEntrar" onclick="portal_entrar()">Entrar →</button>
  </div>

  <!-- Tela 2: Seleção de Filial -->
  <div class="card" id="telaFilial" style="display:none;">
    <div class="card-title" id="filialTitulo">Selecione a Filial</div>
    <div class="card-sub">Escolha a unidade que deseja acessar</div>
    <div class="filiais" id="listaFiliais"></div>
    <button class="voltar" onclick="portal_voltar()">← Voltar</button>
  </div>

  <div class="footer"><span>GCA</span> · Gestão de Almoxarifado · Todos os direitos reservados</div>

</div>
<script>
  function portal_entrar() {
    const empresa = (document.getElementById('inputEmpresa').value || '').trim();
    const codigo  = (document.getElementById('inputCodigo').value  || '').trim();
    const erroEl  = document.getElementById('erroEmpresa');
    const btn     = document.getElementById('btnEntrar');

    erroEl.style.display = 'none';
    if (!empresa || !codigo) {
      erroEl.textContent   = 'Preencha o nome da empresa e o código.';
      erroEl.style.display = 'block';
      return;
    }

    btn.disabled    = true;
    btn.textContent = '⏳ Verificando...';

    google.script.run
      .withSuccessHandler(function(res) {
        btn.disabled    = false;
        btn.textContent = 'Entrar →';
        if (!res.ok) {
          erroEl.textContent   = res.msg;
          erroEl.style.display = 'block';
          return;
        }
        // Só uma filial — vai direto
        if (res.filiais.length === 1) {
          window.location.href = res.filiais[0].link;
          return;
        }
        // Várias filiais — mostra seleção
        document.getElementById('filialTitulo').textContent = res.empresa + ' — Selecione a Filial';
        const lista = document.getElementById('listaFiliais');
        lista.innerHTML = '';
        res.filiais.forEach(function(f) {
          lista.innerHTML += `
            <a class="filial-card" href="${f.link}">
              <div><span class="dot"></span><span class="filial-nome">${f.nome}</span></div>
              <span class="filial-arrow">→</span>
            </a>`;
        });
        document.getElementById('telaEmpresa').style.display = 'none';
        document.getElementById('telaFilial').style.display  = 'block';
      })
      .withFailureHandler(function(err) {
        btn.disabled    = false;
        btn.textContent = 'Entrar →';
        erroEl.textContent   = 'Erro de conexão. Tente novamente.';
        erroEl.style.display = 'block';
      })
      .portal_autenticarEmpresa(empresa, codigo);
  }

  function portal_voltar() {
    document.getElementById('telaFilial').style.display  = 'none';
    document.getElementById('telaEmpresa').style.display = 'block';
    document.getElementById('inputCodigo').value = '';
  }
</script>
</body>
</html>
